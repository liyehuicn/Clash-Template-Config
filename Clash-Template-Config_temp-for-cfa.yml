proxy-providers:
  airport:
    type: http
    url: *url-airport 
    interval: *airport-interval
    path: *proxy-file-path-AirPort
    health-check:
      enable: true
      interval: *airport-interval
      # lazy: true
      url: *health-check-url
  香港节点:
    # type: file
    # path: *proxy-file-path-AirPort
    # filter: *proxy-filter-HK
    type: http
    url: *url-airport 
    interval: *airport-interval
    path: *proxy-file-path-AirPort
    filter: *proxy-filter-HK
    health-check:
      enable: true
      interval: *airport-interval
      # lazy: true
      url: *health-check-url
  台湾节点:
    # type: file
